[workspace]
resolver = "2"
members = [
    "core",
    "crates/*",
    "apps/*",
]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
# Workspace members

# Common dependencies
rshapes = { git = "https://github.com/senseshift/rshapes.git" }

anyhow = "1"
serde = "1"
serde_json = "1"
tracing = "^0.1.37"
getset = "^0.1.2"

async-trait = "^0.1.73"
async-stream = "^0.3.5"
futures = "^0.3.26"
futures-util = "^0.3.26"
tokio = "1"
tokio-util = "^0.7.9"
tokio-stream = "^0.1.14"

# Common Dev dependencies
criterion = { version = "^0.5", features = ["html_reports"] }
flaky_test = "^0.2.2"
mutants = "^0.0.3"
test-case = "3"
test-strategy = "^0.3.1"