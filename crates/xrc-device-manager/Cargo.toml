[package]
name = "xrc-device-manager"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
full = ["default", "grpc"]
default = ["btle-manager", "serialport-manager", "rfcomm-manager"]

btle-manager = ["dep:btleplug"]
serialport-manager = ["dep:serialport"]
rfcomm-manager = []

grpc = ["tonic"]
tonic = ["xrconnect-proto/tonic-server", "dep:tonic"]

[dependencies]
xrconnect-proto = { workspace = true }

anyhow = { workspace = true }
tracing = { workspace = true }

async-trait = "^0.1.73"
async-stream = "^0.3.5"
futures = "^0.3.26"
futures-util = "^0.3.26"
tokio = { version = "^1.27.0", features = ["full"] }
tokio-util = "^0.7.7"
tokio-stream = "^0.1.14"

btleplug = { workspace = true, optional = true }
serialport = { version = "^4.2.2", optional = true }

tonic = { version = "^0.10", optional = true }
log = "0.4.20"

[dev-dependencies]
tracing-subscriber = "^0.3.17"

[[example]]
name = "grpc-server"
required-features = ["tonic"]
