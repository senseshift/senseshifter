syntax = "proto3";

package xrconnect.devices.v1alpha1;

message Device {
  enum Transport {
    TRANSPORT_UNKNOWN = 0;
    TRANSPORT_BLE = 1;
    TRANSPORT_SERIAL = 2;
    TRANSPORT_RFCOMM = 3;
  }

  message Info {
    string manufacturer = 1;
    string model = 2;
  }
  message Properties {
    message Battery {
      enum State {
        STATE_UNKNOWN = 0;
        STATE_CHARGING = 1;
        STATE_DISCHARGING = 2;
        STATE_NOT_CHARGING = 3;
        STATE_FULL = 4;
      }

      optional State state = 1;
      repeated float levels = 2;
    }

    optional string serial_number = 1;
    optional string firmware_version = 2;
    optional Battery battery = 3;
  }

  enum Status {
    STATUS_UNKNOWN = 0;
    STATUS_DISCONNECTED = 1;
    STATUS_CONNECTING = 2;
    STATUS_CONNECTED = 3;
    STATUS_DISCONNECTING = 4;
  }
  enum Chirality {
    CHIRALITY_UNKNOWN = 0;
    CHIRALITY_LEFT = 1;
    CHIRALITY_RIGHT = 2;
  }

  string device_id = 1;
  string name = 2;
  Status status = 3;

  reserved 4 to 50;

  Info info = 51;
  Properties properties = 52;
}

message RawDevice {
  message BluetoothLE {
    // The MAC address of the device.
    string address = 1;
    // The name of the device.
    string name = 2;
  }
  message Serial {
    string port = 1;
  }
  message RFComm {
    // The MAC address of the device.
    string address = 1;
    // The name of the device.
    string name = 2;
  }

  reserved 1 to 20;
  oneof type {
    BluetoothLE bluetooth_le = 21;
    Serial serial = 22;
    RFComm rfcomm = 23;
  }
}