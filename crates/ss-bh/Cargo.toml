[package]
name = "ss-bh"
version.workspace = true
edition.workspace = true

[dependencies]
bh-sdk = { workspace = true, features = ["default", "serde"] }
tokio-tungstenite = "0.27.0"
reqwest = { workspace = true, optional = true }

base64 = { workspace = true }
aes-gcm = { workspace = true, optional = true }
rsa = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
rand_chacha = { workspace = true, optional = true }

xrc-commons = { workspace = true }

anyhow = { workspace = true }
derivative = { workspace = true }
getset = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_qs = "0.15"
thiserror = { workspace = true }
tracing = { workspace = true }

async-stream = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true, features = ["sync"] }
tokio-util = { workspace = true }
dashmap = { workspace = true }
dyn-clone = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }

[features]
default = ["server", "client", "v1", "v2", "v3", "v4"]

server = []

v1 = ["bh-sdk/v1"]
v2 = ["bh-sdk/v2"]
v3 = ["bh-sdk/v3", "dep:reqwest"]
v4 = ["bh-sdk/v4", "dep:reqwest", "dep:aes-gcm", "dep:rsa", "dep:rand", "dep:rand_chacha"]

client = []

[[example]]
name = "simple_server"
path = "examples/simple_server/main.rs"
required-features = ["server"]