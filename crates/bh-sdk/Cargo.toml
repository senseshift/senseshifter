[package]
name = "bh-sdk"
version.workspace = true
edition.workspace = true

[dependencies]
tungstenite = "0.27.0"

anyhow = { workspace = true }
derivative = { workspace = true }
getset = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
strum = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }
futures-channel = "0.3.31"
futures-util = "0.3.31"
tokio-tungstenite = "0.27.0"

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tracing-subscriber = { workspace = true }
futures = { workspace = true }
# Crypto dependencies for encrypted examples
aes-gcm = "0.10"
rsa = "0.9"
base64 = "0.22"
rand = "0.8"
hex = "0.4"
url = "2.5"
http = "0.2"
httparse = "1.8"

[features]
default = ["serde", "v1", "v2", "v3", "v4"]

serde = ["dep:serde", "dep:serde_json"]

v1 = []
v2 = []
v3 = []
v4 = []

[[example]]
name = "ws-logging-server"
path = "examples/ws-logging-server/main.rs"

[[example]]
name = "v4-client"
path = "examples/v4-client.rs"

[[example]]
name = "v4-server"
path = "examples/v4-server.rs"

[[example]]
name = "mitm-server"
path = "examples/mitm-server.rs"